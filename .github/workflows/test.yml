name: The Hive CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic cryptography requests

    - name: Run All Tests
      run: |
        echo "Starting API server..."
        python -m uvicorn api.main:app --host 127.0.0.1 --port 8000 &
        SERVER_PID=$!
        sleep 5
        
        echo "Running Phase 3 Crypto API tests..."
        python api/test_crypto_api.py || exit 1
        
        echo "Running Phase 3.1 DID API tests..."
        python api/test_did_api.py || exit 1
        
        echo "Running Phase 2.1 Adversarial tests..."
        python api/adversarial_tests.py || exit 1

        echo "Running Phase 3.2 Red Team Audit..."
        python scripts/security_audit.py || exit 1
        
        kill $SERVER_PID
