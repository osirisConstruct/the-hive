<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hive — Trust Graph Visualization</title>
    <link rel="stylesheet" href="style.css">
    <!-- D3.js v7 from CDN -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <h1>🕸️ The Hive: Trust Graph</h1>
        <p class="subtitle">Interactive visualization of agent trust relationships</p>
    </header>

    <main>
        <div id="controls">
            <label>
                Min Trust Threshold:
                <input type="range" id="minTrust" min="0" max="100" value="0">
                <span id="minTrustValue">0%</span>
            </label>
            <label>
                <input type="checkbox" id="showEdges" checked>
                Show Edges
            </label>
            <button id="resetZoom">Reset Zoom</button>
            <button id="exportPNG">Export PNG</button>
            <div id="stats"></div>
        </div>

        <div id="graph"></div>

        <div id="tooltip" class="tooltip"></div>
    </main>

    <footer>
        <p>Data source: <code>/trust/graph</code> | Built with D3.js</p>
    </footer>

    <script src="graph.js"></script>
</body>
</html>
